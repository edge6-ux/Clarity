<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Clarity</title>

    <!-- Open Graph / link preview -->
    <meta property="og:title" content="Clarity" />
    <meta property="og:description" content="Any topic. Understood in 60 seconds." />
    <meta property="og:image" content="https://ineedclarity.net/clarity3.png" />
    <meta property="og:url" content="https://ineedclarity.net/" />
    <meta property="og:type" content="website" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Clarity" />
    <meta name="twitter:description" content="Any topic. Understood in 60 seconds." />
    <meta name="twitter:image" content="https://ineedclarity.net/clarity3.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ─── Accent tokens (overridden per theme) ─────────────────────── */
      :root {
        --orb-c1: rgba(176,96,255,0.95);
        --orb-c2: rgba(112,72,210,0.65);
        --orb-c3: rgba(44,18,96,0.25);
        --orb-hi: rgba(200,168,255,0.5);
        --btn-from: #b060ff;
        --btn-to:   #5c48d1;
        --btn-glow: rgba(176,96,255,0.45);
        --focus-border: rgba(176,96,255,0.55);
        --focus-ring:   rgba(176,96,255,0.12);
        --chip-bg:     rgba(176,96,255,0.18);
        --chip-border: rgba(176,96,255,0.38);
        --title-end:   #c49dff;
      }

      *, *::before, *::after { font-family: 'Inter', sans-serif; }

      body { background-color: #000; min-height: 100vh; }

      /* ─── Noise grain ───────────────────────────────────────────────── */
      body::before {
        content: "";
        position: fixed; inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
        background-repeat: repeat; background-size: 256px 256px;
        pointer-events: none; z-index: 9999; mix-blend-mode: overlay;
      }

      /* ─── Orbiting glow ─────────────────────────────────────────────── */
      .orb {
        position: fixed; width: 75vmax; height: 75vmax;
        top: 50%; left: 50%;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%,
          var(--orb-c1) 0%, var(--orb-c2) 18%, var(--orb-c3) 42%, transparent 68%);
        filter: blur(28px);
        pointer-events: none; z-index: 1;
        animation: circularOrbit 18s linear infinite;
        will-change: transform;
        transition: background 0.6s ease;
      }
      .orb::after {
        content: ""; position: absolute; inset: 10%; border-radius: 50%;
        background: radial-gradient(circle at 50% 50%, var(--orb-hi) 0%, transparent 60%);
        filter: blur(12px);
      }
      /* Double-rotation trick: rotate coord system → translate outward → counter-rotate orb.
         As the outer angle sweeps 0→360°, the orb center traces a perfect circle. */
      @keyframes circularOrbit {
        from { transform: translate(-50%,-50%) rotate(0deg)   translateX(42vmin) rotate(0deg);   }
        to   { transform: translate(-50%,-50%) rotate(360deg) translateX(42vmin) rotate(-360deg); }
      }

      /* Pulse — centered breathing orb */
      @keyframes pulseAnim {
        0%, 100% { transform: translate(-50%,-50%) scale(0.82); opacity: 0.52; }
        40%      { transform: translate(-50%,-50%) scale(1.10); opacity: 0.92; }
        60%      { transform: translate(-50%,-50%) scale(1.05); opacity: 0.84; }
      }

      /* Eclipse — orb reacts as void sweeps left → right */
      @keyframes eclipseOrb {
        /* idle */
        0%        { transform: translate(-50%,-50%) scale(0.92); opacity: 0.80; }
        /* void approaching — start dimming */
        30%       { transform: translate(-50%,-50%) scale(0.88); opacity: 0.65; }
        /* void fully over orb — consumed */
        45%, 55%  { transform: translate(-50%,-50%) scale(0.72); opacity: 0.28; }
        /* void clearing — reignite flare */
        68%       { transform: translate(-50%,-50%) scale(1.18); opacity: 1.00; }
        /* settle back */
        82%, 100% { transform: translate(-50%,-50%) scale(0.92); opacity: 0.80; }
      }
      @keyframes eclipseSweep {
        /* start off-screen right */
        0%        { transform: translate(calc(-50% + 100vmin), -50%); opacity: 1; }
        /* sweep to center */
        45%, 55%  { transform: translate(-50%, -50%);                 opacity: 1; }
        /* exit off-screen left */
        95%       { transform: translate(calc(-50% - 100vmin), -50%); opacity: 1; }
        /* fade out just before loop restart to hide the jump */
        98%, 100% { transform: translate(calc(-50% - 100vmin), -50%); opacity: 0; }
      }
      #eclipseOverlay {
        position: fixed; width: 100vmin; height: 100vmin;
        top: 50%; left: 50%;
        border-radius: 50%;
        background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.82) 28%, rgba(0,0,0,0.55) 48%, rgba(0,0,0,0.2) 66%, transparent 80%);
        pointer-events: none; z-index: 2;
        display: none;
        animation: eclipseSweep 38s cubic-bezier(0.45, 0, 0.55, 1) infinite;
        will-change: transform;
      }
      @keyframes eclipseTitleFade {
        0%, 10%   { opacity: 0.72; }
        45%, 55%  { opacity: 0;    }
        70%, 100% { opacity: 0.72; }
      }
      .eclipse-title-fade {
        animation: eclipseTitleFade 38s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      @keyframes eclipseStarsFade {
        0%, 38%   { opacity: 0; }
        47%, 53%  { opacity: 1; }
        65%, 100% { opacity: 0; }
      }
      #eclipseStars {
        position: fixed; inset: 0;
        pointer-events: none; z-index: 3;
        display: none; opacity: 0;
      }

      /* Mini preview for Eclipse card */
      .preview-eclipse {
        position: absolute; inset: 0; overflow: hidden;
        display: flex; align-items: center; justify-content: center;
      }
      .preview-eclipse::before {
        content: "";
        width: 18px; height: 18px; border-radius: 50%;
        background: radial-gradient(circle, var(--btn-from), var(--btn-to));
        box-shadow: 0 0 8px var(--btn-glow);
        position: absolute; flex-shrink: 0;
      }
      .preview-eclipse::after {
        content: "";
        width: 18px; height: 18px; border-radius: 50%;
        background: #000;
        position: absolute;
        animation: eclipseSweep 28s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }

      /* Aurora — wide horizontal band drifting across */
      @keyframes auroraAnim {
        0%   { transform: translateX(0)    translateY(0)    scaleY(1.00) skewX(0deg);  opacity: 0.60; }
        20%  { transform: translateX(8vw)  translateY(-3vh) scaleY(1.30) skewX(-4deg); opacity: 0.82; }
        40%  { transform: translateX(-4vw) translateY(2vh)  scaleY(0.72) skewX(3deg);  opacity: 0.65; }
        60%  { transform: translateX(12vw) translateY(-1vh) scaleY(1.12) skewX(-2deg); opacity: 0.90; }
        80%  { transform: translateX(3vw)  translateY(4vh)  scaleY(0.88) skewX(4deg);  opacity: 0.74; }
        100% { transform: translateX(0)    translateY(0)    scaleY(1.00) skewX(0deg);  opacity: 0.60; }
      }

      /* ─── Glass ─────────────────────────────────────────────────────── */
      .glass {
        background: rgba(255,255,255,0.04);
        backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
        border: 1px solid rgba(255,255,255,0.09);
      }

      /* ─── Inputs ────────────────────────────────────────────────────── */
      .glass-input {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: #fff;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .glass-input::placeholder { color: rgba(255,255,255,0.25); }
      .glass-input:focus {
        outline: none;
        border-color: var(--focus-border);
        box-shadow: 0 0 0 3px var(--focus-ring);
      }

      /* ─── Buttons ───────────────────────────────────────────────────── */
      .btn-primary {
        background: linear-gradient(135deg, var(--btn-from) 0%, var(--btn-to) 100%);
        color: #fff; font-weight: 600; letter-spacing: 0.01em;
        transition: opacity 0.15s, transform 0.1s, box-shadow 0.2s;
      }
      .btn-primary:hover:not(:disabled) { opacity: 0.88; box-shadow: 0 0 22px var(--btn-glow); }
      .btn-primary:active:not(:disabled) { transform: scale(0.97); }
      .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Icy silver button — frosted base tinted by the current accent glow */
      .btn-learn {
        background: linear-gradient(160deg,
          rgba(235, 238, 255, 0.18) 0%,
          rgba(210, 216, 240, 0.10) 100%
        );
        border: 1px solid rgba(255,255,255,0.22);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.22), 0 0 18px var(--btn-glow);
        color: rgba(255,255,255,0.92); font-weight: 600; letter-spacing: 0.01em;
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        transition: box-shadow 0.2s, background 0.2s, transform 0.1s;
      }
      .btn-learn:hover:not(:disabled) {
        background: linear-gradient(160deg,
          rgba(235, 238, 255, 0.26) 0%,
          rgba(210, 216, 240, 0.16) 100%
        );
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.28), 0 0 28px var(--btn-glow);
      }
      .btn-learn:active:not(:disabled) { transform: scale(0.97); }
      .btn-learn:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-ghost {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        color: rgba(255,255,255,0.5);
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .btn-ghost:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.18); color: rgba(255,255,255,0.8); }

      /* ─── Title gradient ────────────────────────────────────────────── */
      .title-gradient {
        background: linear-gradient(135deg, #fff 0%, var(--title-end) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      /* ─── Chips ─────────────────────────────────────────────────────── */
      .chip {
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.42); font-size: 0.72rem;
        transition: background 0.15s, border-color 0.15s, color 0.15s; cursor: pointer;
      }
      .chip:hover { background: var(--chip-bg); border-color: var(--chip-border); color: rgba(255,255,255,0.8); }

      /* ─── Splash screen ─────────────────────────────────────────────── */
      #splashScreen {
        position: fixed; inset: 0; z-index: 9999;
        background: #000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 0;
        pointer-events: none;
      }
      #splashScreen.splash-out {
        animation: splashFadeOut 0.7s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes splashFadeOut {
        from { opacity: 1; }
        to   { opacity: 0; }
      }
      #splashTitle {
        font-family: 'Space Grotesk', sans-serif; font-weight: 700;
        font-size: 2.4rem; letter-spacing: -0.01em;
        margin-top: 14px;
        opacity: 0;
        animation: splashItemIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.4s forwards;
      }
      #splashTagline {
        display: inline-flex; align-items: center; gap: 6px;
        background: rgba(176,96,255,0.12); border: 1px solid rgba(176,96,255,0.28);
        border-radius: 999px; padding: 4px 14px;
        font-size: 0.72rem; color: rgba(255,255,255,0.5);
        letter-spacing: 0.05em; font-weight: 500;
        margin-top: 12px;
        opacity: 0;
        animation: splashItemIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.65s forwards;
      }
      #splashDot {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--btn-from); box-shadow: 0 0 6px var(--btn-glow);
        flex-shrink: 0;
      }
      @keyframes splashItemIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ─── Animations ────────────────────────────────────────────────── */
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .fade-in-up { animation: fadeInUp 0.4s ease both; }

      /* ─── Loading sparkle (sequential arm extension) ───────────────────── */
      @keyframes armExtend {
        0%   { stroke-dashoffset: 6.5; opacity: 0.12; }
        10%  { stroke-dashoffset: 0;   opacity: 1;    }
        22%  { stroke-dashoffset: 0;   opacity: 1;    }
        32%  { stroke-dashoffset: 6.5; opacity: 0.12; }
        100% { stroke-dashoffset: 6.5; opacity: 0.12; }
      }
      .star-burst { overflow: visible; flex-shrink: 0; }
      .star-burst line {
        stroke: currentColor; stroke-width: 2; stroke-linecap: round;
        stroke-dasharray: 6.5;
        stroke-dashoffset: 6.5;
        animation: armExtend 1.2s ease-in-out infinite;
        opacity: 0.12;
      }
      /* pairs: N+S, NE+SW, E+W, SE+NW */
      .star-burst line:nth-child(1) { animation-delay: 0.00s; } /* N  */
      .star-burst line:nth-child(2) { animation-delay: 0.30s; } /* NE */
      .star-burst line:nth-child(3) { animation-delay: 0.60s; } /* E  */
      .star-burst line:nth-child(4) { animation-delay: 0.90s; } /* SE */
      .star-burst line:nth-child(5) { animation-delay: 0.00s; } /* S  */
      .star-burst line:nth-child(6) { animation-delay: 0.30s; } /* SW */
      .star-burst line:nth-child(7) { animation-delay: 0.60s; } /* W  */
      .star-burst line:nth-child(8) { animation-delay: 0.90s; } /* NW */

      @keyframes pulseDot {
        0%, 70%, 100% { transform: scale(0.75) translateY(0);   background-color: rgba(255,255,255,0.2); box-shadow: none; }
        35%            { transform: scale(1.1)  translateY(-4px); background-color: var(--btn-from);       box-shadow: 0 0 6px var(--btn-glow); }
      }
      .dot { animation: pulseDot 1.4s infinite ease-in-out; }
      .dot:nth-child(2) { animation-delay: 0.18s; }
      .dot:nth-child(3) { animation-delay: 0.36s; }

      #contextChevron { transition: transform 0.2s ease; }

      /* ─── Mobile overrides ───────────────────────────────────────────── */
      @media (max-width: 768px) {
        /* Prevent iOS auto-zoom on input focus (requires font-size >= 16px) */
        .glass-input, .menu-auth-input, #learnMoreText {
          font-size: 16px !important;
        }

        /* Cap panel widths on narrow screens */
        #menuPanel      { width: min(288px, 88vw); }
        #customizePanel { width: min(276px, calc(100vw - 3rem)); }

        /* Bigger touch targets for icon buttons */
        #menuBtn, #customizeBtn { width: 44px; height: 44px; }

        /* More breathing room on auth buttons */
        .menu-btn-primary, .menu-btn-ghost { padding: 0.75rem 1rem; }

        /* Bump the tiniest section labels up slightly */
        .followup-label, .deeper-section-label, .menu-section-label, .panel-section-label {
          font-size: 0.68rem;
        }

        /* Reduce top/bottom body padding so content isn't crushed */
        body { padding-top: 4rem; padding-bottom: 5rem; }

        /* Chips — slightly larger tap area */
        .followup-chip, .chip { padding: 7px 14px; }
      }

      /* ─── Hide content mode ──────────────────────────────────────────── */
      #contentWrapper {
        transition: opacity 0.6s ease;
      }
      #contentWrapper.content-hidden {
        opacity: 0; pointer-events: none;
      }
      #menuBtn, #customizeBtn {
        transition: opacity 0.6s ease, background 0.15s, box-shadow 0.2s, transform 0.1s;
      }
      .content-hidden-ui {
        opacity: 0 !important;
        pointer-events: none !important;
      }
      #contextChevron.open { transform: rotate(90deg); }

      /* ─── Result prose ──────────────────────────────────────────────── */
      #result h1, #result h2, #result h3 { color: #ead5ff; font-weight: 600; margin-top: 1.25em; margin-bottom: 0.4em; }
      #result h1 { font-size: 1.15rem; }
      #result h2 { font-size: 1rem; }
      #result h3 { font-size: 0.9rem; }
      #result p  { color: #c4b5d4; line-height: 1.78; margin-bottom: 0.75em; }
      #result strong { color: #e8d5ff; font-weight: 600; }
      #result em     { color: #d4c4ea; font-style: italic; }
      #result code {
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
        padding: 1px 6px; border-radius: 5px; font-size: 0.82em; color: #e0d0ff;
        font-family: 'JetBrains Mono', 'Fira Code', monospace;
      }
      #result pre {
        background: rgba(0,0,0,0.35); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px; padding: 1rem; overflow-x: auto; margin-bottom: 1em;
      }
      #result pre code { background: none; border: none; padding: 0; font-size: 0.8rem; color: #c4b5d4; }
      #result ul, #result ol { color: #c4b5d4; padding-left: 1.4em; margin-bottom: 0.75em; }
      #result li { margin-bottom: 0.3em; }
      #result blockquote {
        border-left: 2px solid rgba(255,255,255,0.15);
        padding-left: 1rem; color: #9a8aaa; margin: 0.75em 0; font-style: italic;
      }
      #result hr { border-color: rgba(255,255,255,0.07); margin: 1em 0; }
      #result a  { color: rgba(255,255,255,0.7); text-decoration: underline; text-underline-offset: 2px; }

      /* ─── Reddit section ────────────────────────────────────────────── */
      #redditSection {
        border-top: 1px solid rgba(255,255,255,0.06);
        padding: 14px 20px 16px;
      }
      #redditSection .reddit-label {
        font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: rgba(255,255,255,0.22);
        display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
      }
      .reddit-post {
        display: flex; flex-direction: column; gap: 1px;
        padding: 8px 10px; border-radius: 8px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        text-decoration: none;
        transition: background 0.15s, border-color 0.15s;
        margin-bottom: 6px;
      }
      .reddit-post:last-child { margin-bottom: 0; }
      .reddit-post:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.1); }
      .reddit-post .rp-title {
        font-size: 0.78rem; color: rgba(255,255,255,0.7);
        line-height: 1.4; display: -webkit-box;
        -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .reddit-post .rp-meta {
        font-size: 0.65rem; color: rgba(255,255,255,0.25);
        margin-top: 3px;
      }

      /* ─── Follow-up section ─────────────────────────────────────────── */
      #followupSection {
        border-top: 1px solid rgba(255,255,255,0.06);
        padding: 14px 20px 16px;
      }
      .followup-label {
        font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: rgba(255,255,255,0.22);
        margin-bottom: 10px;
      }
      .followup-chips { display: flex; flex-wrap: wrap; gap: 7px; }
      .followup-chip {
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        color: rgba(255,255,255,0.5); font-size: 0.72rem;
        padding: 5px 12px; border-radius: 999px; cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        text-align: left;
      }
      .followup-chip:hover { background: var(--chip-bg); border-color: var(--chip-border); color: rgba(255,255,255,0.85); }
      .followup-chip.active { background: var(--chip-bg); border-color: var(--chip-border); color: rgba(255,255,255,0.9); }

      #followupAnswer {
        margin-top: 14px; font-size: 0.82rem; color: rgba(255,255,255,0.65);
        line-height: 1.75; padding: 12px 14px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.07);
        border-radius: 10px;
      }

      #learnMoreSection { margin-top: 14px; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 14px; }
      .deeper-section-label {
        font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: rgba(255,255,255,0.22);
        margin-bottom: 8px; margin-top: 12px;
      }
      .deeper-section-label:first-child { margin-top: 0; }
      /* Resource links */
      .deeper-resources { display: flex; flex-direction: column; gap: 5px; margin-bottom: 4px; }
      .deeper-resource {
        display: flex; align-items: center; justify-content: space-between;
        font-size: 0.78rem; color: rgba(255,255,255,0.55);
        padding: 5px 10px;
        background: rgba(255,255,255,0.03);
        border: 1px solid rgba(255,255,255,0.06);
        border-radius: 8px; text-decoration: none;
        transition: background 0.15s, color 0.15s;
      }
      .deeper-resource:hover { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.85); }
      .deeper-resource-source { font-size: 0.68rem; color: rgba(255,255,255,0.28); flex-shrink: 0; margin-left: 8px; }
      #learnMoreInput { display: flex; gap: 7px; margin-top: 10px; }
      #learnMoreInput input  { flex: 1; font-size: 0.75rem; padding: 6px 12px; border-radius: 8px; }
      #learnMoreInput button { font-size: 0.72rem; padding: 6px 14px; border-radius: 8px; white-space: nowrap; }

      /* ─── Articles section ──────────────────────────────────────────── */
      #articlesSection {
        border-top: 1px solid rgba(255,255,255,0.06);
        padding: 14px 20px 16px;
      }
      #articlesSection .articles-label {
        font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: rgba(255,255,255,0.22);
        display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
      }

      #customizeBtn {
        position: fixed; bottom: 1.5rem; right: 1.5rem;

        display: flex; align-items: center; justify-content: center;
        cursor: pointer; z-index: 500;
        transition: background 0.15s, box-shadow 0.2s, transform 0.1s;

      #customizeBtn:active { transform: scale(0.94); }
      #customizeBtn.panel-open { background: rgba(255,255,255,0.1); }

      /* ─── Customize panel ───────────────────────────────────────────── */
      #customizePanel {
        position: fixed; bottom: 5.5rem; right: 1.5rem;

        opacity: 0; transform: translateY(8px) scale(0.98);
        pointer-events: none;
        transition: opacity 0.22s ease, transform 0.22s ease;
      }
      #customizePanel.open {
        opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
      }

      /* Color swatches */
      .swatch {
        width: 26px; height: 26px; border-radius: 50%;
        cursor: pointer; flex-shrink: 0;
        box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);

      /* Animation option cards */
      .anim-card {
        border-radius: 10px; height: 62px;

        align-items: center; justify-content: flex-end;

      }
      .anim-card:hover:not(.soon) { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.07); }
      .anim-card.active { border-color: rgba(255,255,255,0.35); background: rgba(255,255,255,0.08); }
      .anim-card.soon { cursor: default; opacity: 0.45; }
      .anim-card .anim-label {
        font-size: 0.65rem; color: rgba(255,255,255,0.55);
        letter-spacing: 0.04em; font-weight: 500; position: relative; z-index: 1;
      }
      .anim-card .soon-badge {
        position: absolute; top: 5px; right: 5px;
        font-size: 0.5rem; color: rgba(255,255,255,0.3);
        background: rgba(255,255,255,0.06); border-radius: 4px;
        padding: 1px 4px; letter-spacing: 0.06em; font-weight: 600; text-transform: uppercase;
      }

      /* Mini previews inside animation cards */
      .preview-orbit {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      }
      .preview-orbit::before {
        content: "";
        width: 28px; height: 28px; border-radius: 50%;
        border: 1px dashed rgba(255,255,255,0.18);
        position: absolute;
      }
      .preview-orbit::after {
        content: "";
        width: 8px; height: 8px; border-radius: 50%;
        background: radial-gradient(circle, var(--btn-from), var(--btn-to));
        box-shadow: 0 0 6px var(--btn-glow);
        position: absolute;
        animation: miniOrbit 3s linear infinite;
        transform-origin: center;
        top: calc(50% - 14px); left: 50%; margin-left: -4px;
      }
      @keyframes miniOrbit {
        from { transform: rotate(0deg)   translateY(14px) rotate(0deg); }
        to   { transform: rotate(360deg) translateY(14px) rotate(-360deg); }
      }

      .preview-pulse {
        position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
      }
      .preview-pulse::after {
        content: "";
        width: 14px; height: 14px; border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.4), transparent 70%);
        box-shadow: 0 0 0 6px rgba(255,255,255,0.06), 0 0 0 12px rgba(255,255,255,0.03);
      }

      .preview-aurora {
        position: absolute; inset: 0;
        background: linear-gradient(160deg,
          transparent 20%, rgba(255,255,255,0.06) 40%,
          rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.06) 60%, transparent 80%);
      }

      .preview-static {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse 80% 80% at 0% 0%, rgba(255,255,255,0.12) 0%, transparent 70%);
      }

      /* ─── Storm ─────────────────────────────────────────────────────── */
      #stormContainer { position:fixed; inset:0; pointer-events:none; z-index:1; display:none; }

      @keyframes rollCloud {
        from { transform: translateX(110vw); }
        to   { transform: translateX(calc(-100% - 10vw)); }
      }

      .storm-roll {
        position: absolute;
        animation: rollCloud linear infinite;
      }

      #lightningFlash {
        position: fixed; inset: 0;
        background: var(--btn-from);
        opacity: 0; pointer-events: none; z-index: 3;
        transition: opacity 0.04s ease;
      }

      /* Mini preview for Storm card */
      @keyframes miniCloudRoll {
        from { transform: translateX(72px); }
        to   { transform: translateX(-72px); }
      }
      @keyframes miniFlash {
        0%, 75%, 80%, 84%, 100% { opacity: 0; }
        77%, 82%                 { opacity: 1; }
      }
      .preview-storm {
        position: absolute; inset: 0; overflow: hidden;
        background: #05060f;
      }
      .preview-storm::before {
        content: "";
        position: absolute; top: 0; left: 0; right: 0; height: 100%;
        background: rgba(190,215,255,0);
        animation: miniFlash 5s ease-in-out infinite;
      }
      .preview-storm .mini-cloud {
        position: absolute;
        animation: miniCloudRoll linear infinite;
      }

      /* Panel section label */
      .panel-section-label {
        font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
        text-transform: uppercase; color: rgba(255,255,255,0.25);
        margin-bottom: 10px;
      }
    </style>

      /* ── Animation definitions ───────────────────────────────────────── */
      const ANIMS = [
        { id: 'orbit',   name: 'Orbit',   previewClass: 'preview-orbit'   },
        { id: 'pulse',   name: 'Pulse',   previewClass: 'preview-pulse'   },
        { id: 'aurora',  name: 'Aurora',  previewClass: 'preview-aurora'  },
        { id: 'static',  name: 'Static',  previewClass: 'preview-static'  },
        { id: 'eclipse', name: 'Eclipse', previewClass: 'preview-eclipse' },
        { id: 'storm',   name: 'Storm',   previewClass: 'preview-storm', soon: true },
      ];

      /* ── Supabase ────────────────────────────────────────────────────── */
      const _supa = supabase.createClient(
        'https://eybakzgielanbewxmqoe.supabase.co',
        'sb_publishable_4gFX1hFfgcb8neclkxy5kA_gvmImlJA'
      );

      let _authMode = 'signin'; // 'signin' | 'signup'

      function authToggleMode() {
        _authMode = _authMode === 'signin' ? 'signup' : 'signin';
        document.getElementById('authSubmitBtn').textContent = _authMode === 'signin' ? 'Sign in' : 'Create account';
        document.getElementById('authToggleBtn').textContent = _authMode === 'signin' ? 'Create account' : 'Back to sign in';
        document.getElementById('authError').classList.add('hidden');
      }

      async function authSubmit() {
        const email    = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const errEl    = document.getElementById('authError');
        const btn      = document.getElementById('authSubmitBtn');

        if (!email || !password) { showAuthError('Please enter your email and password.'); return; }

        btn.textContent = _authMode === 'signin' ? 'Signing in...' : 'Creating account...';
        btn.disabled = true;
        errEl.classList.add('hidden');

        const { error } = _authMode === 'signin'
          ? await _supa.auth.signInWithPassword({ email, password })
          : await _supa.auth.signUp({ email, password });

        btn.disabled = false;
        btn.textContent = _authMode === 'signin' ? 'Sign in' : 'Create account';

        if (error) { showAuthError(error.message); return; }
        document.getElementById('authEmail').value    = '';
        document.getElementById('authPassword').value = '';
      }

      async function authSignOut() {
        await _supa.auth.signOut();
      }

      function showAuthError(msg) {
        const el = document.getElementById('authError');
        el.textContent = msg;
        el.classList.remove('hidden');
      }

      function updateMenuAuthUI(user) {
        const authSection = document.getElementById('menuAuthSection');
        const userSection = document.getElementById('menuUserSection');
        if (user) {
          authSection.classList.add('hidden');
          userSection.classList.remove('hidden');
          document.getElementById('menuUserEmail').textContent = user.email;
        } else {
          authSection.classList.remove('hidden');
          userSection.classList.add('hidden');
        }
      }

      // React to auth state changes in real time
      _supa.auth.onAuthStateChange((_event, session) => {
        updateMenuAuthUI(session?.user ?? null);
      });

      // Set initial UI state from existing session
      _supa.auth.getSession().then(({ data }) => {
        updateMenuAuthUI(data.session?.user ?? null);
      });

      /* ── State ───────────────────────────────────────────────────────── */
      let currentTheme = localStorage.getItem('clarity-theme') || 'violet';
      let currentAnim  = localStorage.getItem('clarity-anim')  || 'eclipse';
      let panelOpen      = false;
      let menuOpen       = false;
      let contentHidden  = localStorage.getItem('clarity-hide-content') === 'true';
      let lastMarkdown = "";
      let loadingInterval = null;

      const LOADING_PHRASES = [
        'gazing into the abyss',
        'searching for clarity',
        'embracing the orb',
        'enveloped by the void',
        'navigating infinity',
      ];

      function startLoadingPhrases() {
        document.getElementById('loadingText').textContent =
          LOADING_PHRASES[Math.floor(Math.random() * LOADING_PHRASES.length)] + '...';
      }

      function stopLoadingPhrases() {
        clearInterval(loadingInterval);
        loadingInterval = null;
      }

      const root = document.documentElement;

      /* ── Apply theme ─────────────────────────────────────────────────── */
      function applyTheme(id) {
        const t = THEMES[id];
        if (!t) return;
        Object.keys(t).forEach(k => { if (k.startsWith('--')) root.style.setProperty(k, t[k]); });
        currentTheme = id;
        localStorage.setItem('clarity-theme', id);
        // Update active swatch
        document.querySelectorAll('.swatch').forEach(el => {
          el.classList.toggle('active', el.dataset.id === id);
        });
        document.getElementById('themeLabel').textContent = t.name;
      }

      /* ── Render swatches ─────────────────────────────────────────────── */
      function renderSwatches() {
        const container = document.getElementById('swatchContainer');
        const label     = document.getElementById('themeLabel');
        Object.entries(THEMES).forEach(([id, t]) => {
          const btn = document.createElement('button');
          btn.className = 'swatch' + (id === currentTheme ? ' active' : '');
          btn.dataset.id = id;
          btn.title = t.name;
          btn.style.background = `linear-gradient(135deg, ${t.s[0]}, ${t.s[1]})`;
          btn.addEventListener('click', () => applyTheme(id));
          btn.addEventListener('mouseenter', () => { label.textContent = t.name; });
          btn.addEventListener('mouseleave', () => { label.textContent = THEMES[currentTheme].name; });
          container.appendChild(btn);
        });
      }

      /* ── Render animation cards ──────────────────────────────────────── */
      function renderAnimCards() {
        const container = document.getElementById('animContainer');
        ANIMS.forEach(a => {
          const card = document.createElement('div');
          card.className = 'anim-card' + (a.id === currentAnim ? ' active' : '') + (a.soon ? ' soon' : '');
          card.innerHTML = `
            <div class="${a.previewClass}"></div>
            <span class="anim-label">${a.name}</span>
            ${a.soon ? '<span class="soon-badge">Soon</span>' : ''}
          `;
          if (!a.soon) card.addEventListener('click', () => selectAnim(a.id));
          container.appendChild(card);
        });
      }

      /* ── Storm flash engine ──────────────────────────────────────────── */
      let stormTimeout   = null;
      let starLoopId     = null;
      let starData       = [];

      function triggerFlash() {
        const flash = document.getElementById('lightningFlash');
        // 3 flash patterns: single strong, double flicker, triple stutter
        const pattern = Math.floor(Math.random() * 3);

        function pulse(opacity, holdMs, fadeMs) {
          return new Promise(resolve => {
            flash.style.transition = 'none';
            flash.style.opacity = String(opacity);
            setTimeout(() => {
              flash.style.transition = `opacity ${fadeMs}ms ease`;
              flash.style.opacity = '0';
              setTimeout(resolve, fadeMs);
            }, holdMs);
          });
        }

        async function runPattern() {
          if (pattern === 0) {
            // Single strong bloom
            await pulse(0.22, 55, 120);
          } else if (pattern === 1) {
            // Double flicker
            await pulse(0.18, 40, 60);
            await new Promise(r => setTimeout(r, 80));
            await pulse(0.12, 35, 100);
          } else {
            // Triple stutter — rapid then fade
            await pulse(0.20, 30, 40);
            await new Promise(r => setTimeout(r, 55));
            await pulse(0.14, 25, 35);
            await new Promise(r => setTimeout(r, 40));
            await pulse(0.08, 20, 80);
          }
        }

        runPattern();
        stormTimeout = setTimeout(triggerFlash, 4000 + Math.random() * 10000);
      }

      function initEclipseStars() {
        const canvas = document.getElementById('eclipseStars');
        const dpr = window.devicePixelRatio || 1;
        const w = window.innerWidth;
        const h = window.innerHeight;

        // Size canvas in physical pixels, display in CSS pixels (retina/mobile sharp)
        canvas.width  = w * dpr;
        canvas.height = h * dpr;
        canvas.style.width  = w + 'px';
        canvas.style.height = h + 'px';

        const ctx = canvas.getContext('2d');
        ctx.scale(dpr, dpr); // all draw calls now use CSS pixel coords

        // Generate stars with independent twinkle params, positions in CSS px space
        starData = Array.from({ length: 90 }, () => ({
          x:     Math.random() * w,
          y:     Math.random() * h,
          r:     Math.random() * 0.9 + 0.2,
          base:  Math.random() * 0.28 + 0.15,
          amp:   Math.random() * 0.22 + 0.10,
          speed: Math.random() * 1.2 + 0.3,
          phase: Math.random() * Math.PI * 2,
        }));

        if (starLoopId) cancelAnimationFrame(starLoopId);

        function drawStars(ts) {
          const t = ts / 1000;
          ctx.clearRect(0, 0, w, h);
          for (const s of starData) {
            const opacity = s.base + s.amp * Math.sin(t * s.speed * Math.PI * 2 + s.phase);
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${Math.max(0, opacity)})`;
            ctx.fill();
          }
          starLoopId = requestAnimationFrame(drawStars);
        }

        starLoopId = requestAnimationFrame(drawStars);
        canvas.style.display = 'block';
        canvas.style.animation = 'eclipseStarsFade 38s cubic-bezier(0.45, 0, 0.55, 1) infinite';
      }

      // Reinitialize stars on orientation change / resize while eclipse is active
      window.addEventListener('resize', () => {
        if (currentAnim === 'eclipse' && starLoopId) initEclipseStars();
      });

      function startStorm() {
        document.getElementById('stormContainer').style.display = 'block';
        stormTimeout = setTimeout(triggerFlash, 1000 + Math.random() * 3000);
      }

      function stopStorm() {
        clearTimeout(stormTimeout);
        stormTimeout = null;
        document.getElementById('stormContainer').style.display = 'none';
      }

      function selectAnim(id) {
        const orb = document.querySelector('.orb');
        const overlay = document.getElementById('eclipseOverlay');

        // Clear all inline overrides so CSS defaults (orbit) can resume
        ['top','left','width','height','transform','borderRadius','animation','filter','opacity'].forEach(p => {
          orb.style[p] = '';
        });
        overlay.style.display = 'none';
        stopStorm();
        if (starLoopId) { cancelAnimationFrame(starLoopId); starLoopId = null; }
        document.getElementById('siteTitle').classList.remove('eclipse-title-fade');
        document.getElementById('siteTagline').classList.remove('eclipse-title-fade');
        const starsCanvas = document.getElementById('eclipseStars');
        starsCanvas.style.display = 'none';
        starsCanvas.style.animation = 'none';

        switch (id) {
          case 'orbit':
            // CSS rule handles everything — orbitPage animation, 75vmax, top/left 0
            break;

          case 'pulse':
            // top/left default to 50%/50% from CSS — just swap the animation
            orb.style.animation = 'pulseAnim 5s ease-in-out infinite';
            break;

          case 'aurora':
            // Wide flat band that drifts and undulates horizontally
            orb.style.top          = '22%';
            orb.style.left         = '-15%';
            orb.style.width        = '130vw';
            orb.style.height       = '28vh';
            orb.style.transform    = 'none';
            orb.style.borderRadius = '50%';
            orb.style.filter       = 'blur(55px)';
            orb.style.animation    = 'auroraAnim 12s ease-in-out infinite';
            break;

          case 'static':
            // Corner glow — override center defaults, stop animation
            orb.style.top       = '0';
            orb.style.left      = '0';
            orb.style.transform = 'translate(-50%, -50%)';
            orb.style.animation = 'none';
            break;

          case 'eclipse':
            orb.style.animation = 'eclipseOrb 38s cubic-bezier(0.45, 0, 0.55, 1) infinite';
            overlay.style.display = 'block';
            initEclipseStars();
            document.getElementById('siteTitle').classList.add('eclipse-title-fade');
            document.getElementById('siteTagline').classList.add('eclipse-title-fade');
            break;

          case 'storm':
            orb.style.opacity  = '0';
            orb.style.animation = 'none';
            startStorm();
            break;
        }

        currentAnim = id;
        localStorage.setItem('clarity-anim', id);
        document.querySelectorAll('.anim-card').forEach((el, i) => {
          el.classList.toggle('active', ANIMS[i].id === id);
        });
      }

      /* ── History ─────────────────────────────────────────────────────── */
      function getLocalHistory() {
        try { return JSON.parse(localStorage.getItem('clarity-history') || '[]'); }
        catch { return []; }
      }

      async function saveToHistory(topic, preview) {
        const { data: { session } } = await _supa.auth.getSession();
        const clean = preview.slice(0, 80);

        if (session?.user) {
          // Remove any existing entry for this topic, then insert fresh
          await _supa.from('search_history')
            .delete()
            .eq('user_id', session.user.id)
            .ilike('topic', topic);
          await _supa.from('search_history')
            .insert({ user_id: session.user.id, topic, preview: clean });
        } else {
          // Fall back to localStorage when signed out
          const hist = getLocalHistory().filter(h => h.topic.toLowerCase() !== topic.toLowerCase());
          hist.unshift({ topic, preview: clean, ts: Date.now() });
          localStorage.setItem('clarity-history', JSON.stringify(hist.slice(0, 20)));
        }
      }

      function timeAgo(ts) {
        const s = Math.floor((Date.now() - ts) / 1000);
        if (s < 60)   return 'just now';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }

      function renderHistoryItems(items) {
        const list = document.getElementById('historyList');
        if (!items.length) {
          list.innerHTML = '<div class="history-empty">Your recent topics<br>will appear here</div>';
          return;
        }
        list.innerHTML = items.map(h => `
          <div class="history-item" onclick="rerunTopic(${JSON.stringify(h.topic)})">
            <div style="flex:1;min-width:0">
              <div class="history-item-topic">${h.topic}</div>
              <div class="history-item-time">${timeAgo(h.ts ?? new Date(h.created_at).getTime())}</div>
            </div>
          </div>`).join('');
      }

      async function renderHistory() {
        const list = document.getElementById('historyList');
        const { data: { session } } = await _supa.auth.getSession();

        if (session?.user) {
          const { data } = await _supa.from('search_history')
            .select('topic, preview, created_at')
            .eq('user_id', session.user.id)
            .order('created_at', { ascending: false })
            .limit(20);

          if (data && data.length) {
            renderHistoryItems(data);
          } else {
            // Signed in but no history — show trending
            list.innerHTML = `<div class="menu-section-label" style="margin-top:0.5rem">Trending</div><div id="trendingList"><div class="history-empty" style="padding:1rem">Loading...</div></div>`;
            try {
              const articles = await fetch('/trending').then(r => r.json());
              const tl = document.getElementById('trendingList');
              if (!tl) return;
              if (!articles.length) { tl.innerHTML = '<div class="history-empty">Nothing trending right now</div>'; return; }
              tl.innerHTML = articles.map(a => `
                <a class="trending-item" href="${a.url}" target="_blank" rel="noopener noreferrer">
                  ${a.image
                    ? `<img class="trending-thumb" src="${a.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
                    : `<div class="trending-thumb-placeholder"></div>`}
                  <div style="flex:1;min-width:0">
                    <div class="trending-title">${a.title}</div>
                    <div class="trending-source">${a.source}</div>
                  </div>
                </a>`).join('');
            } catch {
              const tl = document.getElementById('trendingList');
              if (tl) tl.innerHTML = '<div class="history-empty">Couldn\'t load trending</div>';
            }
          }
        } else {
          const local = getLocalHistory();
          if (local.length) {
            renderHistoryItems(local);
          } else {
            list.innerHTML = '<div class="history-empty">Sign in to save your searches across devices</div>';
          }
        }
      }

      function rerunTopic(topic) {
        closeMenu();
        document.getElementById('topicInput').value = topic;
        explainTopic();
      }

      /* ── Menu toggle ─────────────────────────────────────────────────── */
      function toggleMenu() { menuOpen ? closeMenu() : openMenu(); }
      async function openMenu() {
        menuOpen = true;
        document.getElementById('menuPanel').classList.add('open');
        document.getElementById('menuBackdrop').classList.add('open');
        document.getElementById('menuBtn').classList.add('open');
        await renderHistory();
      }
      function closeMenu() {
        menuOpen = false;
        document.getElementById('menuPanel').classList.remove('open');
        document.getElementById('menuBackdrop').classList.remove('open');
        document.getElementById('menuBtn').classList.remove('open');
      }
      document.addEventListener('keydown', e => { if (e.key === 'Escape') { closePanel(); closeMenu(); } });

      /* ── Hide content ────────────────────────────────────────────────── */
      function applyHideContent(hidden) {
        const wrapper = document.getElementById('contentWrapper');
        const thumb   = document.getElementById('hideContentThumb');
        const toggle  = document.getElementById('hideContentToggle');
        const menuBtn = document.getElementById('menuBtn');
        if (hidden) {
          wrapper.classList.add('content-hidden');
          menuBtn.classList.add('content-hidden-ui');
          toggle.style.background = 'var(--btn-from)';
          toggle.style.borderColor = 'var(--btn-from)';
          thumb.style.transform = 'translateX(16px)';
          thumb.style.background = '#fff';
        } else {
          wrapper.classList.remove('content-hidden');
          menuBtn.classList.remove('content-hidden-ui');
          toggle.style.background = 'rgba(255,255,255,0.1)';
          toggle.style.borderColor = 'rgba(255,255,255,0.12)';
          thumb.style.transform = '';
          thumb.style.background = 'rgba(255,255,255,0.4)';
        }
      }

      function toggleHideContent() {
        contentHidden = !contentHidden;
        localStorage.setItem('clarity-hide-content', contentHidden);
        applyHideContent(contentHidden);
        if (contentHidden) closePanel();
      }

      /* ── Panel toggle ────────────────────────────────────────────────── */
      function togglePanel() {
        panelOpen ? closePanel() : openPanel();
      }
      function openPanel() {
        panelOpen = true;
        document.getElementById('customizePanel').classList.add('open');
        document.getElementById('customizeBtn').classList.add('panel-open');
      }
      function closePanel() {
        panelOpen = false;
        document.getElementById('customizePanel').classList.remove('open');
        document.getElementById('customizeBtn').classList.remove('panel-open');
      }

      // Close on outside click
      document.addEventListener('click', e => {
        if (panelOpen && !e.target.closest('#customizePanel') && !e.target.closest('#customizeBtn')) {
          closePanel();
        }
      });
      // Close panel on outside click
      document.addEventListener('click', e => {
        if (panelOpen && !e.target.closest('#customizePanel') && !e.target.closest('#customizeBtn')) closePanel();
      });

      /* ── Main app ────────────────────────────────────────────────────── */
      const topicInput     = document.getElementById('topicInput');
      const contextInput   = document.getElementById('contextInput');
      const fileInput      = document.getElementById('fileInput');
      const fileLabel      = document.getElementById('fileLabel');
      const contextPanel   = document.getElementById('contextPanel');
      const contextChevron = document.getElementById('contextChevron');
      const output         = document.getElementById('output');
      const loading        = document.getElementById('loading');
      const resultCard     = document.getElementById('resultCard');
      const result         = document.getElementById('result');
      const resultTopic    = document.getElementById('resultTopic');
      const resultImage    = document.getElementById('resultImage');
      const readTime       = document.getElementById('readTime');
      const btn            = document.getElementById('analyzeBtn');
      const copyToast      = document.getElementById('copyToast');

      topicInput.addEventListener('keydown', e => { if (e.key === 'Enter') analyze(); });

      function setTopic(text) { topicInput.value = text; topicInput.focus(); }

      function toggleContext() {
        const hidden = contextPanel.classList.toggle('hidden');
        contextChevron.classList.toggle('open', !hidden);
      }

      function updateFileLabel() {
        fileLabel.textContent = fileInput.files[0] ? fileInput.files[0].name : 'Attach a PDF or image';
      }

      function resetUI() {
        output.classList.add('hidden');
        resultCard.classList.add('hidden');
        result.innerHTML = '';
        resultImage.classList.add('hidden');
        resultImage.src = '';
        document.getElementById('followupSection').classList.add('hidden');
        document.getElementById('followupChips').innerHTML = '';
        document.getElementById('followupCustomInput').style.display = 'flex';
        document.getElementById('learnMoreText').value = '';
        document.getElementById('followupAnswer').classList.add('hidden');
        document.getElementById('followupAnswer').textContent = '';
        document.getElementById('learnMoreSection').classList.add('hidden');
        document.getElementById('deeperResources').innerHTML = '';
        document.getElementById('deeperResourcesLabel').style.display = 'none';
        document.getElementById('articlesSection').classList.add('hidden');
        document.getElementById('articlePosts').innerHTML = '';
        document.getElementById('redditSection').classList.add('hidden');
        document.getElementById('redditPosts').innerHTML = '';
        lastMarkdown = '';
        topicInput.value = '';
        topicInput.focus();
      }

      function copyResult() {
        if (!lastMarkdown) return;
        navigator.clipboard.writeText(lastMarkdown).then(() => {
          copyToast.classList.add('show');
          setTimeout(() => copyToast.classList.remove('show'), 2000);
        });
      }

      function estimateReadTime(text) {
        const mins = Math.max(1, Math.round(text.trim().split(/\s+/).length / 200));
        return mins === 1 ? '~1 min read' : `~${mins} min read`;
      }

      async function handleFollowUp(chipEl, topic, question) {
        // Mark active chip (if from a pill)
        document.querySelectorAll('.followup-chip').forEach(c => c.classList.remove('active'));
        if (chipEl) chipEl.classList.add('active');

        // Hide the input row — this is a one-turn interaction
        document.getElementById('followupCustomInput').style.display = 'none';

        const answerEl      = document.getElementById('followupAnswer');
        const learnMoreEl   = document.getElementById('learnMoreSection');
        answerEl.textContent = '…';
        answerEl.classList.remove('hidden');
        learnMoreEl.classList.add('hidden');

        try {
          const res  = await fetch('/followup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ topic, question }),
          });
          const data = await res.json();
          answerEl.textContent = data.answer ?? '';

          // Resources — real external links for this specific question
          const resourcesEl    = document.getElementById('deeperResources');
          const resourcesLabel = document.getElementById('deeperResourcesLabel');
          resourcesEl.innerHTML = '';
          if (data.resources && data.resources.length) {
            data.resources.forEach(r => {
              let domain = '';
              try { domain = new URL(r.url).hostname.replace('www.', ''); } catch {}
              const a = document.createElement('a');
              a.className = 'deeper-resource';
              a.href      = r.url;
              a.target    = '_blank';
              a.rel       = 'noopener noreferrer';
              a.innerHTML = `<span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${r.title}</span><span class="deeper-resource-source">${domain}</span>`;
              resourcesEl.appendChild(a);
            });
            resourcesLabel.style.display = '';
          } else {
            resourcesLabel.style.display = 'none';
          }

          learnMoreEl.classList.remove('hidden');
        } catch {
          answerEl.textContent = 'Something went wrong. Try again.';
        }
      }

      function submitLearnMore() {
        const val = document.getElementById('learnMoreText').value.trim();
        if (!val) return;
        document.getElementById('learnMoreText').value = '';
        handleFollowUp(null, topicInput.value.trim(), val);
      }

      async function analyze() {
        const topic = topicInput.value.trim();
        if (!topic) return;

        output.classList.remove('hidden');
        loading.classList.remove('hidden');
        resultCard.classList.add('hidden');
        result.innerHTML = '';
        lastMarkdown = '';
        btn.disabled = true;
        btn.textContent = '…';
        startLoadingPhrases();

        try {
          const formData = new FormData();
          formData.append('topic', topic);
          const ctx = contextInput.value.trim();
          if (ctx) formData.append('context', ctx);
          if (fileInput.files[0]) formData.append('file', fileInput.files[0]);

          const data = await fetch('/analyze', { method: 'POST', body: formData }).then(r => r.json());

          loading.classList.add('hidden');
          resultCard.classList.remove('hidden');
          resultCard.classList.add('fade-in-up');

          if (data.error) {
            resultImage.classList.add('hidden');
            result.innerHTML = `<p style="color:rgba(248,113,113,0.8);font-size:0.85rem">${data.error}</p>`;
          } else {
            lastMarkdown = data.result;
            result.innerHTML = marked.parse(data.result);
            resultTopic.textContent = topic;
            readTime.textContent = estimateReadTime(data.result);
            saveToHistory(topic, data.result.replace(/[#*`]/g, '').trim());
            if (data.image) {
              resultImage.src = data.image;
              resultImage.classList.remove('hidden');
            } else {
              resultImage.classList.add('hidden');
            }

            // Follow-up questions
            const followupSection = document.getElementById('followupSection');
            const followupChips   = document.getElementById('followupChips');
            if (data.followUps && data.followUps.length) {
              followupChips.innerHTML = '';
              data.followUps.forEach(q => {
                const btn = document.createElement('button');
                btn.className = 'followup-chip';
                btn.textContent = q;
                btn.onclick = () => handleFollowUp(btn, topic, q);
                followupChips.appendChild(btn);
              });
              followupSection.classList.remove('hidden');
            } else {
              followupSection.classList.add('hidden');
            }

            // HackerNews articles
            const articlesSection = document.getElementById('articlesSection');
            const articlePosts    = document.getElementById('articlePosts');
            if (data.articles && data.articles.length) {
              articlePosts.innerHTML = data.articles.map(a => `
                <a class="article-post" href="${a.url}" target="_blank" rel="noopener noreferrer">
                  <div class="ap-text">
                    <span class="ap-title">${a.title}</span>
                    <span class="ap-meta">${a.source || a.domain}</span>
                  </div>
                  ${a.points ? `<span class="ap-points">${a.points.toLocaleString()} pts</span>` : ''}
                </a>`).join('');
              articlesSection.classList.remove('hidden');
            } else {
              articlesSection.classList.add('hidden');
            }

            // Reddit posts
            const redditSection = document.getElementById('redditSection');
            const redditPosts   = document.getElementById('redditPosts');
            if (data.reddit && data.reddit.length) {
              redditPosts.innerHTML = data.reddit.map(p => `
                <a class="reddit-post" href="${p.url}" target="_blank" rel="noopener noreferrer">
                  <span class="rp-title">${p.title}</span>
                  <span class="rp-meta">r/${p.subreddit} &middot; ${p.score.toLocaleString()} upvotes</span>
                </a>`).join('');
              redditSection.classList.remove('hidden');
            } else {
              redditSection.classList.add('hidden');
            }
          }
        } catch {
          loading.classList.add('hidden');
          resultCard.classList.remove('hidden');
          result.innerHTML = `<p style="color:rgba(248,113,113,0.7);font-size:0.85rem">Something went wrong. Is the server running?</p>`;
        } finally {
          stopLoadingPhrases();
          btn.disabled = false;
          btn.textContent = 'Learn';
        }
      }

      /* ── Init ────────────────────────────────────────────────────────── */
      applyTheme(currentTheme);
      renderSwatches();
      renderAnimCards();
      selectAnim(currentAnim);
      applyHideContent(contentHidden);
    </script>
  </body>
</html>
